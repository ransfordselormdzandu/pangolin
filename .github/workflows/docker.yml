name: Docker Workflow

on:
  - push

env:
  CONTAINER_REGISTRY: docker.io
  DOCKER_USERNAME: selormey
  IMAGE_NAME: test_app

jobs: 
  docker_build: 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Docker Build
        run: docker build -t $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest .

      - name: Docker Login
        run: docker login --username=$DOCKER_USERNAME --password=${{ secrets.DOCKER_HUB_TOKEN}}
        # Alternative using token:
        # run: docker login --username=$DOCKER_USERNAME --password-stdin <<< "$DOCKER_HUB_TOKEN"
 
      - name: Docker Publish 
        run: docker push $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest

  docker_deploy:
    needs: docker_build
    runs-on: ubuntu-latest 

    steps:
      - name: Docker Login
       # run: docker login --username=$DOCKER_USERNAME --password=$DOCKER_PASSWORD
        # Alternative using token:
        run: docker login --username=$DOCKER_USERNAME --password-stdin <<< ${{ secrets.DOCKER_HUB_TOKEN}}

      - name: Docker Run
        run: docker run -d -p 8080:80 $CONTAINER_REGISTRY/$DOCKER_USERNAME/$IMAGE_NAME:latest